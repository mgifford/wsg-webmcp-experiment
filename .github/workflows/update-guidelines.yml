name: Update WSG guidelines data

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-guidelines:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download latest WSG JSON files
        run: |
          mkdir -p data

          curl -fsSL \
            https://raw.githubusercontent.com/w3c/sustainableweb-wsg/main/guidelines.json \
            -o data/guidelines.json.new

          curl -fsSL \
            https://raw.githubusercontent.com/w3c/sustainableweb-wsg/main/star.json \
            -o data/star.json.new
            

      - name: Validate JSON
        run: |
          jq empty data/guidelines.json.new
          jq empty data/star.json.new

      - name: Replace file if changed
        run: |
          if [ ! -f data/guidelines.json ]; then
            mv data/guidelines.json.new data/guidelines.json
            echo "changed=true" >> "$GITHUB_ENV"
          elif cmp -s data/guidelines.json data/guidelines.json.new; then
            rm data/guidelines.json.new
            echo "changed=false" >> "$GITHUB_ENV"
          else
            mv data/guidelines.json.new data/guidelines.json
            echo "changed=true" >> "$GITHUB_ENV"
          fi


      - name: Replace files if changed
        run: |
          changed=false

          for file in guidelines.json star.json; do
            new_file="data/$file.new"
            current_file="data/$file"

            if [ ! -f "$new_file" ]; then
              echo "Missing downloaded file: $new_file"
              exit 1
            fi

            if [ ! -f "$current_file" ]; then
              mv "$new_file" "$current_file"
              changed=true
            elif cmp -s "$current_file" "$new_file"; then
              rm "$new_file"
            else
              mv "$new_file" "$current_file"
              changed=true
            fi
          done

          echo "changed=$changed" >> "$GITHUB_ENV"

      - name: Commit and push changes
        if: env.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/guidelines.json data/star.json
          git diff --cached --quiet || git commit -m "Update WSG data files"
          git push
          
